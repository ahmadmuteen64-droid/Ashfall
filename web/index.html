<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AshFall — Voxel Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2128; --border: #30363d;
  --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
  --danger: #f85149; --warn: #d2991d; --success: #3fb950;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  display: grid;
  grid-template-rows: 52px 1fr;
  grid-template-columns: 230px 1fr 340px;
  grid-template-areas: "top top top" "left view right";
}

/* ── Top bar ─────────────────────────────── */
#topbar {
  grid-area: top; display: flex; align-items: center; gap: 14px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 14px; font-size: 13px; overflow-x: auto; white-space: nowrap;
}
#topbar .title { font-weight: 700; font-size: 15px; letter-spacing: 0.5px; margin-right: 6px; }
#topbar .title span { color: var(--accent); }
.tb-group { display: flex; align-items: center; gap: 6px; }
.tb-sep { width: 1px; height: 26px; background: var(--border); flex: none; }
button {
  font: inherit; color: var(--text); background: var(--surface2);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 11px; cursor: pointer; transition: 0.12s;
}
button:hover { border-color: var(--accent); }
#playBtn { min-width: 84px; font-weight: 600; }
#playBtn.playing { border-color: var(--success); color: var(--success); }
.tb-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
.tb-val { font-variant-numeric: tabular-nums; min-width: 44px; display: inline-block; }
.tb-num {
  width: 72px; font: inherit; color: var(--text); background: var(--surface2);
  border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px;
  font-variant-numeric: tabular-nums;
}
input[type="range"] { accent-color: var(--accent); }
#topbar input[type="range"] { width: 110px; }
select {
  font: inherit; color: var(--text); background: var(--surface2);
  border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px;
}
.danger-btn { color: var(--danger); }
.danger-btn:hover { border-color: var(--danger); }
.accent-btn { color: var(--accent); }

/* ── Left: tools + palette ───────────────── */
#left {
  grid-area: left; background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; min-height: 0;
}
#tools { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 10px; border-bottom: 1px solid var(--border); }
.tool { font-size: 12px; padding: 7px 4px; }
.tool.active { border-color: var(--accent); color: var(--accent); background: #1a2634; }
#palette { flex: 1; overflow-y: auto; padding-bottom: 8px; }
.pal-cat { padding: 12px 14px 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #484f58; }
.pal-item {
  display: flex; align-items: center; gap: 9px; padding: 6px 14px;
  cursor: pointer; border-left: 3px solid transparent; font-size: 13px;
}
.pal-item:hover { background: var(--surface2); }
.pal-item.active { background: var(--surface2); border-left-color: var(--accent); }
.pal-name { flex: 1; }
.pal-phase { font-size: 10px; color: var(--muted); border: 1px solid var(--border); border-radius: 4px; padding: 0 4px; }
.swatch { width: 16px; height: 16px; border-radius: 4px; flex: none; border: 1px solid rgba(255,255,255,0.15); }
.swatch.big { width: 34px; height: 34px; border-radius: 8px; }
#newMatBtn { margin: 10px; }

/* ── Center: 3D viewport ─────────────────── */
#viewport { grid-area: view; position: relative; min-width: 0; min-height: 0; }
#gl { width: 100%; height: 100%; display: block; touch-action: none; }
#hud {
  position: absolute; left: 12px; bottom: 10px; font-size: 11px; color: var(--muted);
  background: rgba(13,17,23,0.75); border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 10px; pointer-events: none;
}

/* ── Right: authoring panels ─────────────── */
#right {
  grid-area: right; background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; min-height: 0;
}
#tabs { display: flex; border-bottom: 1px solid var(--border); }
.tab {
  flex: 1; border: none; border-radius: 0; background: none; padding: 11px 4px;
  color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
  border-bottom: 2px solid transparent;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
#panels { flex: 1; overflow-y: auto; padding: 14px; }
.hint { color: var(--muted); font-size: 13px; line-height: 1.5; }

.ed-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.ed-name { font-weight: 700; font-size: 16px; }
.ed-id { color: var(--muted); font-size: 12px; }
.badge {
  font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--warn);
  border: 1px solid var(--warn); border-radius: 4px; padding: 1px 5px; margin-left: 4px; vertical-align: 2px;
}

.form { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.field { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.fl { width: 108px; flex: none; color: var(--muted); }
.fc { flex: 1; display: flex; align-items: center; gap: 6px; }
.fc input[type="text"], .fc input[type="number"], .fc textarea, .fc select {
  width: 100%; font: inherit; color: var(--text); background: var(--surface2);
  border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px;
}
.fc input[type="color"] { width: 44px; height: 28px; padding: 1px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; }
.fc input[type="range"] { flex: 1; }
.rv { font-size: 11px; color: var(--muted); min-width: 30px; text-align: right; }
.form-sep {
  margin: 10px 0 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
  color: #484f58; border-top: 1px solid var(--border); padding-top: 10px;
}

.rx-row {
  display: flex; align-items: flex-start; gap: 8px; padding: 9px 10px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 7px;
  font-size: 12.5px;
}
.rx-desc { flex: 1; line-height: 1.45; }
.rx-desc b { color: var(--accent); font-weight: 600; }
.rx-note { color: var(--muted); font-size: 11px; margin-top: 2px; }
.rx-chance { color: var(--warn); font-size: 11px; }
.rx-del { padding: 1px 8px; color: var(--danger); border: none; background: none; font-size: 16px; }

.cell-head { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px; margin-bottom: 12px; }
.cell-grid { display: flex; flex-direction: column; gap: 6px; }
.prop {
  display: flex; justify-content: space-between; padding: 7px 10px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; font-size: 12.5px;
}
.prop span { color: var(--muted); }
</style>
</head>
<body>

<header id="topbar">
  <div class="title">AshFall <span>Voxel Lab</span></div>

  <div class="tb-group">
    <button id="playBtn">▶ Play</button>
    <button id="stepBtn" title="Advance one tick (S)">Step</button>
    <span class="tb-label">tick</span><span class="tb-val" id="tickVal">0</span>
  </div>
  <div class="tb-sep"></div>

  <div class="tb-group">
    <span class="tb-label">speed</span>
    <input type="range" id="speedRange" min="1" max="30" value="8">
    <span class="tb-val" id="speedVal">8</span>
  </div>
  <div class="tb-sep"></div>

  <div class="tb-group">
    <span class="tb-label">ambient</span>
    <input type="range" id="ambientRange" min="-100" max="2000" value="20" step="5">
    <input type="number" id="ambientNum" class="tb-num" value="20" step="5" title="Type any value — not limited to the slider range">
    <span class="tb-label">°C</span>
  </div>
  <div class="tb-sep"></div>

  <div class="tb-group">
    <span class="tb-label">slice</span>
    <input type="range" id="clipRange" min="0" max="15" value="15">
    <span class="tb-val" id="clipVal">y≤15</span>
  </div>
  <div class="tb-sep"></div>

  <div class="tb-group">
    <span class="tb-label">volume</span>
    <select id="volumeSel">
      <option value="12">12³</option>
      <option value="16" selected>16³</option>
      <option value="24">24³</option>
    </select>
    <button id="demoBtn" title="Rebuild the demo scene">Demo</button>
    <button id="clearBtn">Clear</button>
    <button id="resetTempsBtn" title="Reset every cell to its default temperature">❄ Reset temps</button>
  </div>
  <div class="tb-sep"></div>

  <div class="tb-group">
    <button id="exportBtn" title="Download materials + reactions as JSON">⇩ Export</button>
    <button id="copyBtn" title="Copy JSON to clipboard">Copy</button>
    <button id="resetDbBtn" class="danger-btn" title="Restore default material database">Reset DB</button>
  </div>
</header>

<aside id="left">
  <div id="tools"></div>
  <div id="palette"></div>
  <button id="newMatBtn" class="accent-btn">＋ New material</button>
</aside>

<main id="viewport">
  <canvas id="gl"></canvas>
  <div id="hud">🖱 left: apply tool (hold 🔥/❄ to keep heating/cooling) · right-drag: orbit · wheel: zoom · middle-drag: pan · Space: play/pause · S: step · 1–6: tools</div>
</main>

<aside id="right">
  <div id="tabs">
    <button class="tab active" data-tab="material">Material</button>
    <button class="tab" data-tab="reactions">Reactions</button>
    <button class="tab" data-tab="cell">Cell</button>
  </div>
  <div id="panels">
    <div id="panel-material"></div>
    <div id="panel-reactions" style="display:none"></div>
    <div id="panel-cell" style="display:none"></div>
  </div>
</aside>

<script src="vendor/three.min.js"></script>
<script src="vendor/OrbitControls.js"></script>
<script src="data.js"></script>
<script src="sim.js"></script>
<script src="render3d.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>
<script>
// WebSocket bridge client — syncs DB state with the MCP server.
(function() {
  var port = 9138;
  var ws = null, reconnectTimer = null;

  function connect() {
    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
    try {
      ws = new WebSocket('ws://localhost:' + port);
      ws.onopen = function() {
        console.log('[bridge] connected to MCP sync');
        ws.send(JSON.stringify({ type: 'hello', role: 'browser' }));
      };
      ws.onmessage = function(e) {
        var msg;
        try { msg = JSON.parse(e.data); } catch (err) { return; }
        // Re-broadcasts from the bridge: apply DB updates
        if (msg.type === 'db_updated') {
          if (msg.db) {
            localStorage.setItem(DB.STORE_KEY, JSON.stringify(msg.db));
            DB.load();
            UI.buildPalette();
            if (App.state.inspected) {
              var c = App.state.inspected;
              UI.renderCellPanel(App.sim.cellInfo(c.x, c.y, c.z));
            }
          }
        }
      };
      ws.onclose = function() { ws = null; scheduleReconnect(); };
      ws.onerror = function() { ws = null; scheduleReconnect(); };
    } catch (e) { scheduleReconnect(); }
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(function() { reconnectTimer = null; connect(); }, 3000);
  }

  // Expose hook: called by ui.js after any DB mutation
  window.__bridgePush = function() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        type: 'db_updated',
        db: { version: 2, materials: DB.materials, reactions: DB.reactions }
      }));
    }
  };

  setTimeout(connect, 500);
})();
</script>
</body>
</html>
